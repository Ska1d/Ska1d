<!DOCTYPE html>

<html lang = "eng">

<head>
	<meta charset = "UTF-8">
	<meta name="description" content="Tin whistle tablature converter. Fingerings are written in an easy-to-copy format.">
	<script src = "script.js" defer></script>

	<title>Tin Whistle Tabulatura</title>

	<link rel = "stylesheet" href = "style.css">
	
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Oswald:wght@200..700&display=swap" rel="stylesheet">

	<link rel="icon" href="icon512.png" sizes="512">
	<link rel="icon" href="icon192.png" sizes="192">
	<link rel="icon" href="icon32.png" sizes="32">
	<link rel="icon" href="icon16.png" sizes="16">	

	<link rel="apple-touch-icon" href="icon192.png">
</head>

<body>
	<div class = main>
		<h1>
			Tin Whistle Tabulatura
		</h1>

		<div class = "tabs" id = "tabs">
		</div>

		<div class = octave>
			<p>-- octave 1 --</p>
			<div class = flat>
				<div class = flat1>
					<button id = "d#" >d#</button>
				</div>

				<div class = flat2>
					<button id = "f#">f#</button>
					<button id = "g#">g#</button>
					<button id = "a#">a#</button>
				</div>

				<div class = flat3>
					<button id = "c#">c#</button>
				</div>
			</div>

			<div class = notes>
				<button id = "d">d</button>
				<button id = "e">e</button>
				<button id = "f">f</button>
				<button id = "g">g</button>		
				<button id = "a">a</button>
				<button id = "b">b</button>
				<button id = "c">c</button>
			</div>
		</div>

		<div class = octave>
			<p>-- octave 2 --</p>
			<div class = flat>
				<div class = flat1>
					<button id = "D#">D#</button>
				</div>

				<div class = flat2>
					<button id = "F#">F#</button>
					<button id = "G#">G#</button>
					<button id = "A#">A#</button>
				</div>

				<div class = flat3>
					<button id = "C#">C#</button>
				</div>
			</div>

			<div class = notes>
				<button id = "D">D</button>
				<button id = "E">E</button>
				<button id = "F">F</button>
				<button id = "G">G</button>
				<button id = "A">A</button>
				<button id = "B">B</button>
				<button id = "C">C</button>
			</div>

			<div class = additionally>
				<button id = "space">Spc</button>
				<button id = "backspace">←</button>
			</div>
		</div>
	</div>
</body>


</html>
